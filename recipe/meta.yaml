{% set name = "nambazasimu" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/nambazasimu-{{ version }}.tar.gz
  sha256: 76828fc99413cbf00a26aa5c13c105014cd0e9a95414859ff0eed40957bb49fc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - nambazasimu
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/genie360s/nambazasimu
  summary: A package to identify Tanzanian phone number carriers.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - genie360s
